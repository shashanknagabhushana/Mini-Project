<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentAI - Resume Screening System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

```
<header>
    <h1>TalentAI</h1>
    <p>Resume Screening & Application Tracking System</p>
</header>

<div class="dashboard">
    <div class="card">
        <h3>Total Applications</h3>
        <p id="totalApps">0</p>
    </div>

    <div class="card">
        <h3>Shortlisted</h3>
        <p id="shortlisted">0</p>
    </div>

    <div class="card">
        <h3>Rejected</h3>
        <p id="rejected">0</p>
    </div>
</div>

<div class="form-section">
    <h2>Add Candidate</h2>

    <input type="text" id="name" placeholder="Candidate Name">
    <input type="email" id="email" placeholder="Email Address">
    <input type="text" id="skills" placeholder="Skills (HTML, CSS, JavaScript)">
    <input type="number" id="experience" placeholder="Experience (Years)">

    <button onclick="addCandidate()">Add Candidate</button>
</div>

<div class="screening-section">
    <h2>Resume Screening</h2>

    <input type="text" id="requiredSkills" placeholder="Required Skills">

    <button onclick="screenCandidates()">Screen Candidates</button>
    <button onclick="clearAllData()">Clear All Data</button>
</div>

<h2>Candidate List</h2>

<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Skills</th>
            <th>Experience</th>
            <th>Match %</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
    </thead>

    <tbody id="candidateTable">
    </tbody>
</table>

<footer>
    <p>Developed by P N Shashank | Mini Project 2026</p>
</footer>
```

</div>

<script src="script.js"></script>

</body>
</html>
